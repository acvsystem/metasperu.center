<ion-grid>
  <ion-row class="ion-align-items-center" style="border-bottom: 2px solid #f4f4f4; margin-bottom: 20px;">
    <ion-col size="12" size-md="8">
      <h1 class="title-page" style="margin: 0; font-weight: 700; color: #2c3e50;">Inventario</h1>
      <p style="color: #7f8c8d; margin: 4px 0 15px 0;">Gestion de inventario de unidades por tienda</p>
    </ion-col>
  </ion-row>

  <ion-row class="ion-align-items-end ion-margin-bottom">
    <ion-col size="12" size-md="4" size-lg="2">
      <div class="control-container">
        <mt-select [data]="dataSelectStore" label="Seleccione Unidad Servicio" title="Tienda"
          (selectdOption)="onChangeSelect($event)">
        </mt-select>
      </div>
    </ion-col>
    <ion-col size="12" size-md="4" size-lg="1" style="display: flex;align-items: center;">
      <button (click)="onSendInventory()" type="button" matTooltip="Verificar"
        style="display: flex;justify-content: center;align-items: center;"
        class="btn btn-primary btn-sm mobil-margin-button"><mat-icon>inventory_2</mat-icon><span>Consultar Inv</span>
      </button>
    </ion-col>

    <hr style="background-color: black;width: 1px;margin-right: 10px;">


    <ion-col size="12" size-md="4" size-lg="2">
      <mt-input (keyup)="onChangeInput($event)"
        label="Email" placeholder="Correo electrónico..."></mt-input>
    </ion-col>

    <ion-col size="12" size-md="4" size-lg="2">
      <div class="control-container">
        <mt-select [data]="cboStoreList" [isMultiselect]=true label="Seleccione Tiendas" title="Tienda"
          (selectdOption)="onChangeSelectMultiple($event)">
        </mt-select>
      </div>
    </ion-col>

    <ion-col size="12" size-md="4" size-lg="2" style="display: flex;align-items: center;">
      <button (click)="onEmailInventory()" type="button" matTooltip="Verificar"
        style="display: flex;justify-content: center;align-items: center;"
        class="btn btn-primary btn-sm mobil-margin-button"><mat-icon>forward_to_inbox</mat-icon><span>Enviar
          Email</span>
      </button>
    </ion-col>

    <ion-col size="12" size-md="4" size-lg="12" style="display: flex;justify-content: flex-end;">
      <button mat-raised-button class=" btn-excel" (click)="exportarExcel()">
        <mat-icon>file_download</mat-icon>
        <span>Exportar Excel</span>
        <span class="record-count">{{ dataInventory.length | number }} items</span>
      </button>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col size="12">
      <div class="table-card">
        <mt-datatable [dataIn]="dataInventory" [dataColumnsIn]="expColumnsInventory"
          [extraColumns]="expDisplayedColumnsInventory">
        </mt-datatable>
      </div>
    </ion-col>
  </ion-row>
</ion-grid>

@if (isNotification) {
<mt-notification [type]="typeNotification" [message]="messageNotification"
  (onClose)="cerrarNotificacion()"></mt-notification>
}

<mt-loader *ngIf="isLoading" [title]="titleLoader"></mt-loader>
