<ion-grid>
    <ion-row class="ion-align-items-center" style="border-bottom: 2px solid #f4f4f4; margin-bottom: 20px;">
        <ion-col size="12" size-md="8">
            <h3 class="title-page" style="margin: 0; font-weight: 700; color: #2c3e50;">Consolidado de Horas Extras</h3>
            <p style="color: #7f8c8d; margin: 4px 0 15px 0;">Acumulado de horas extras por empleado</p>
        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col size="12">
            <div class="table-card">
                 <mt-datatable [dataIn]="dataTable" [dataColumnsIn]="columnsTable" [isTableMobile]="false"
                    [extraColumns]=" displayedColumnsTable">
                </mt-datatable>
            </div>
        </ion-col>
    </ion-row>
</ion-grid>
