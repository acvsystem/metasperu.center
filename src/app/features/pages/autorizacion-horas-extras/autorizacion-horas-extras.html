<ion-grid>
    <ion-row class="ion-align-items-center" style="border-bottom: 2px solid #f4f4f4; margin-bottom: 20px;">
        <ion-col size="12" size-md="8">
            <h1 class="title-page" style="margin: 0; font-weight: 700; color: #2c3e50;">Autizacion de Horas extras.</h1>

        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col size="12">
            <div class="table-card">
                <mt-datatable [dataIn]="dataTable" [dataColumnsIn]="columnsTable" [isTableMobile]="true"
                    [extraColumns]=" displayedColumnsTable" (callback)="onAuth($event)">
                </mt-datatable>
            </div>
        </ion-col>
    </ion-row>
</ion-grid>

@if (isNotification) {
<mt-notification [type]="typeNotification" [message]="messageNotification"
    (onClose)="cerrarNotificacion()"></mt-notification>
}
