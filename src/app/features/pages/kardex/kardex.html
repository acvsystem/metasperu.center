<ion-grid>
    <ion-row class="ion-align-items-center" style="border-bottom: 2px solid #f4f4f4; margin-bottom: 20px;">
        <ion-col size="12" size-md="8">
            <h1 class="title-page" style="margin: 0; font-weight: 700; color: #2c3e50;">Kardex</h1>
            <p style="color: #7f8c8d; margin: 4px 0 15px 0;">Gestion de kardex de contabilidad</p>
        </ion-col>
    </ion-row>

    <mat-tab-group dynamicHeight>
        <mat-tab label="KARDEX">
            <mt-kardex [cboStore]="cboStoreList"></mt-kardex>
        </mat-tab>
        <mat-tab label="CUO">
            <mt-cuo [cboStore]="cboStoreList"></mt-cuo>
        </mat-tab>
    </mat-tab-group>
</ion-grid>
