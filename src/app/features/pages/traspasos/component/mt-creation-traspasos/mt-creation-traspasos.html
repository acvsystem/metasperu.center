<div style="padding-top: 10px;">
    <ion-row>
        <ion-col size="12" size-md="4" size-lg="2">
            <div>
                <mt-select [data]="dataSelectStore" label="Seleccione Unidad Servicio" title="Tienda"
                    (selectdOption)="onChangeSelect($event,'selectedUnidServicio')">
                </mt-select>
            </div>
        </ion-col>
        <ion-col size="12" size-md="4" size-lg="4">
            <div class="conteiner-cbo-store">
                <div class="control-container">
                    <mt-select [data]="cboStoreOrigen" label="Tienda Origen" title="Tienda"
                        (selectdOption)="onChangeSelect($event,'cboStoreOrigen')">
                    </mt-select>
                </div>
                <div class="content-icon"><span class="icon"><mat-icon>cloud_sync</mat-icon></span>
                </div>
                <div class="control-container">
                    <mt-select [data]="cboStoreDestino" label="Tienda Destino" title="Tienda"
                        (selectdOption)="onChangeSelect($event,'cboStoreDestino')">
                    </mt-select>
                </div>
            </div>
        </ion-col>
        <ion-col sizeXs="12" sizeSm="12" sizeMd="3" sizeLg="3" style="display: flex;align-items: center;">
            <button type="button" matTooltip="Generar Traspaso" (click)="onNewTraspaso()"
                style="display: flex;justify-content: center;align-items: center;margin-right: 10px;"
                class="btn btn-primary btn-sm mobil-margin-button"><mat-icon>refresh</mat-icon><span>Nevo
                    Traspaso</span>
            </button>
            <input #fileInput hidden type="file" (change)="onImportarExcel($event)" accept=".xml,.xlsx" />
            <button type="file" matTooltip="Importar Productos" class="btn btn-success btn-sm btn-impor-excel"
                (click)="fileInput.click()"><mat-icon>upload</mat-icon> <span>Importar Excel</span></button>

            <button type="button" matTooltip="Generar Traspaso" (click)="onGenerarTraspaso()"
                style="display: flex;justify-content: center;align-items: center;margin-left: 10px;"
                class="btn btn-danger btn-sm mobil-margin-button"><mat-icon>trolley</mat-icon><span>Generar
                    Traspaso</span>
            </button>
        </ion-col>
        <ion-col sizeXs="12" sizeSm="12" sizeMd="12" sizeLg="3"
            style="display: flex;justify-content: end;align-items: center;">
            <div class="footer-stats">
                <span style="margin-right: 50px;font-size: 17px;"><span style="font-weight: 500;">Items:</span> {{
                    dataInventory.length }}</span>
                <span style="margin-right: 50px;font-size: 17px;"><span style="font-weight: 500;">Total Unidades:</span>
                    {{ calcularSumaTotal() }}</span>
            </div>
        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col sizeXs="12" sizeSm="12" sizeMd="12" sizeLg="2">
            <mt-input (keyup)="onChangeInput($event,'searchCodigoBarra')" label="Codigo barra"
                placeholder="Buscar codigo barra"></mt-input>
        </ion-col>
        <ion-col sizeXs="12" sizeSm="12" sizeMd="12" sizeLg="1">
            <mt-input (keyup)="onChangeInput($event,'searchCantidad')" label="Cantidad"
                placeholder="Cantidad"></mt-input>
        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col size="12">
            <div class="table-card">
                <mt-datatable [dataIn]="dataInventory" [dataColumnsIn]="columnsInventory"
                    [extraColumns]="displayedColumnsInventory">
                </mt-datatable>
            </div>
        </ion-col>
    </ion-row>
</div>

@if (isNotification) {
<mt-notification [type]="typeNotification" [message]="messageNotification"
    (onClose)="cerrarNotificacion()"></mt-notification>
}
