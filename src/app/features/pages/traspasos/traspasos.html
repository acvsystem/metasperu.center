<ion-grid>
    <ion-row class="ion-align-items-center" style="border-bottom: 2px solid #f4f4f4; margin-bottom: 20px;">
        <ion-col size="12" size-md="8">
            <h1 class="title-page" style="margin: 0; font-weight: 700; color: #2c3e50;">Traspasos Inventario</h1>
            <p style="color: #7f8c8d; margin: 4px 0 15px 0;">Gestion de traspasos de inventario</p>
        </ion-col>
    </ion-row>

    <mat-tab-group dynamicHeight>
        <mat-tab label="Creacion de Traspasos">
            <mt-creation-traspasos [storeList]="storeList"></mt-creation-traspasos>
        </mat-tab>
        <mat-tab label="Traspasos Realizados">
            <mt-registros-traspasos></mt-registros-traspasos>
        </mat-tab>
    </mat-tab-group>
</ion-grid>
