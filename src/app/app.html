<ion-app>

    <ion-menu contentId="main-content">
        <ion-header>
            <ion-toolbar>
                <ion-title>Menú</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
            <div class="example-menu" *ngFor="let menu of menuFiltrado" cdkMenu>

                <ion-menu-toggle class="example-menu" auto-hide="true">
                    <button class="menu-item" cdkMenuItem>
                        <span>csss</span>
                    </button>
                </ion-menu-toggle>

            </div>
        </ion-content>
    </ion-menu>

    <div id="main-content">
        <ion-header>
            <ion-toolbar>
                <ion-buttons slot="start">
                    <ion-menu-button></ion-menu-button>
                </ion-buttons>

                <ion-title>METAS PERU</ion-title>

                <ion-buttons slot="end">
                    <ion-button id="profile-popover-trigger">
                        <ion-avatar class="avatar-header">
                            <img src="../assets/metasicon.png" />
                        </ion-avatar>
                        <mat-icon>keyboard_arrow_down</mat-icon>
                    </ion-button>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-popover trigger="profile-popover-trigger" triggerAction="click" [dismissOnSelect]="true">
            <ng-template>
                <div class="user-popover-header ion-padding">
                    <img src="../assets/metasicon.png" width="24">
                    <div class="user-info">
                        <span class="label">{{roleUser}}</span>
                    </div>
                </div>

                <ion-list lines="full">
                    <ion-item button class="item-perfil">
                        <mat-icon>notifications</mat-icon>
                        <ion-label>Notificaciones</ion-label>
                    </ion-item>
                    <ion-item button class="item-perfil">
                        <mat-icon>settings</mat-icon>
                        <ion-label>Configuración cuenta</ion-label>
                    </ion-item>
                    <ion-item button detail="false" class="logout-btn">
                        <mat-icon>logout</mat-icon>
                        <ion-label color="danger">Cerrar sesión</ion-label>
                    </ion-item>
                </ion-list>
            </ng-template>
        </ion-popover>

        <ion-content class="ion-padding">
            <router-outlet></router-outlet>
        </ion-content>

        <toas-notification></toas-notification>

    </div>
</ion-app>
